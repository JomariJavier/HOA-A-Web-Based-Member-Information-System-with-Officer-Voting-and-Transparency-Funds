$kind: http-request
name: Login
method: POST
url: 'http://localhost:8081/api/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "admin",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
