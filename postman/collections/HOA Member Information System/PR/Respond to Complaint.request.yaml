$kind: http-request
name: Respond to Complaint
method: PATCH
url: 'http://localhost:8081/api/pr/complaints/1/respond'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "response": "We will investigate this matter and follow up within 48 hours",
      "status": "in_progress"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
